<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTF - 主頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #ffffff;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 100px 20px 60px;
        }
        .logo {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00ffcc, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.3rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        .nav {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .nav a:hover {
            color: #00ffcc;
        }
        .section {
            padding: 80px 20px;
            text-align: center;
        }
        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 16px;
            width: 300px;
            transition: 0.4s;
        }
        .card:hover {
            transform: translateY(-15px);
            background: rgba(0, 255, 204, 0.1);
        }
        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">HTF</div>
        <h1>歡迎來到 HTF</h1>
        <p>這裡是你的未來起點</p>
    </header>

    <div class="nav">
        <a href="#">首頁</a>
        <a href="#">關於</a>
        <a href="#">服務</a>
        <a href="#">作品</a>
        <a href="#">聯絡</a>
    </div>

    <div class="section">
        <h2>我們提供什麼</h2>
        <div class="cards">
            <div class="card">
                <h3>🚀 快速解決</h3>
                <p>專業的技術支援與解決方案</p>
            </div>
            <div class="card">
                <h3>💡 創意設計</h3>
                <p>打造獨特且吸引人的視覺體驗</p>
            </div>
            <div class="card">
                <h3>🔧 開發工具</h3>
                <p>高效能網站與應用程式開發</p>
            </div>
        </div>
    </div>

    <footer>
        © 2026 HTF. All Rights Reserved.
    </footer>

</body>
</html>
